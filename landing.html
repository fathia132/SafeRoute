<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SafeRoute</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body {
  font-family: 'Inter', sans-serif;
  background: #F5F0E8;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.page {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  background: #F5F0E8;
  display: flex;
  flex-direction: column;
}

/* TOP HERO SECTION */
.hero-top {
  background: #F5F0E8;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 0;
  position: relative;
  min-height: 55vh;
}

.hero-top img {
  width: 100%;
  max-width: 340px;
  object-fit: contain;
  border-radius: 16px;
}

/* BOTTOM WHITE CARD */
.hero-bottom {
  background: white;
  border-radius: 32px 32px 0 0;
  padding: 36px 28px 48px;
  text-align: center;
  margin-top: -20px;
  position: relative;
  z-index: 2;
  box-shadow: 0 -4px 30px rgba(0,0,0,0.06);
}

/* WAVE/CURVE at top of white card */
.hero-bottom::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 50px;
  height: 5px;
  background: #E0DAD0;
  border-radius: 3px;
  margin-top: 12px;
}

.hero-bottom h1 {
  font-size: 26px;
  font-weight: 800;
  color: #1A1A1A;
  margin-bottom: 10px;
  letter-spacing: -0.5px;
}

.hero-bottom p {
  font-size: 14px;
  color: #888888;
  margin-bottom: 36px;
  font-weight: 500;
}

/* SIGN UP BUTTON */
.btn-signup {
  display: block;
  width: 100%;
  padding: 17px;
  background: #1B5E3B;
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 1px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  transition: opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
  margin-bottom: 20px;
}
.btn-signup:active { opacity: 0.85; }

/* ALREADY HAVE ACCOUNT */
.login-link {
  font-size: 12px;
  color: #AAAAAA;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.login-link a {
  color: #1B5E3B;
  font-weight: 800;
  text-decoration: none;
}
</style>
</head>
<body>
<div class="page">

  <!-- TOP — woman image -->
  <div class="hero-top">
    <img src="{{ url_for('static', filename='render.jpg') }}" alt="SafeRoute"/>
  </div>

  <!-- BOTTOM — white card -->
  <div class="hero-bottom">
    <h1>We are what we do</h1>
    <p>Your Safety, Your Priority</p>

    <a href="/signup" class="btn-signup">SIGN UP</a>

    <p class="login-link">
      ALREADY HAVE AN ACCOUNT? <a href="/signin">LOG IN</a>
    </p>
  </div>

</div>
</body>
</html>
