<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saved – SafeRoute</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F8F8F8;min-height:100vh;display:flex;justify-content:center}
.page{width:100%;max-width:420px;min-height:100vh;background:#F8F8F8;padding-bottom:140px}
.page-header{padding:40px 24px 8px}
.page-header h1{font-size:24px;font-weight:800;color:#1A1A1A;margin-bottom:4px}
.page-header p{font-size:13px;color:#999;line-height:1.5}
.hint-bar{margin:14px 20px 0;background:#E8F5EE;border-radius:14px;padding:12px 16px;font-size:13px;color:#1B5E3B;font-weight:600;display:none;text-align:center}
.hint-bar.show{display:block}
.section-label{padding:20px 24px 10px;font-size:13px;font-weight:700;color:#AAAAAA;letter-spacing:0.5px;text-transform:uppercase}
.add-dest-card{margin:0 20px;background:white;border-radius:20px;padding:20px;box-shadow:0 2px 14px rgba(0,0,0,0.06)}
.add-dest-card h3{font-size:15px;font-weight:800;color:#1A1A1A;margin-bottom:16px}
.field-group{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.inp{width:100%;padding:13px 16px;border:1.5px solid #E8E4DC;border-radius:14px;font-size:14px;font-family:'Inter',sans-serif;background:white;color:#1A1A1A;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.inp::placeholder{color:#CCCCCC}
.inp:focus{border-color:#1B5E3B}
.btn-green{width:100%;padding:14px;background:#1B5E3B;color:white;border:none;border-radius:50px;font-size:13px;font-weight:700;letter-spacing:0.5px;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity 0.15s;-webkit-tap-highlight-color:transparent}
.btn-green:active{opacity:0.85}
.reminder-list{padding:0 20px;display:flex;flex-direction:column;gap:12px;margin-top:12px}
.reminder-card{background:white;border-radius:20px;padding:16px 18px;box-shadow:0 2px 14px rgba(0,0,0,0.06);display:flex;align-items:center;gap:14px;cursor:pointer;border:2.5px solid transparent;transition:all 0.2s}
.reminder-card.selected{border-color:#1B5E3B;box-shadow:0 4px 20px rgba(27,94,59,0.15)}
.card-icon{width:48px;height:48px;border-radius:14px;background:#F0FAF4;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.reminder-card.selected .card-icon{background:#1B5E3B}
.card-details{flex:1;min-width:0}
.card-dest{font-size:15px;font-weight:700;color:#1A1A1A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.card-time{font-size:13px;color:#555;font-weight:500}
.card-right{display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0}
.tick{width:24px;height:24px;border-radius:50%;background:#1B5E3B;color:white;display:none;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.reminder-card.selected .tick{display:flex}
.del-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#DDDDDD;line-height:1;padding:2px}
.emergency-card{margin:20px 20px 0;background:white;border-radius:20px;padding:20px;box-shadow:0 2px 14px rgba(0,0,0,0.06)}
.emergency-card h3{font-size:15px;font-weight:800;color:#1A1A1A;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.emergency-card .sub{font-size:12px;color:#999;margin-bottom:16px;line-height:1.5}
.contact-item{display:flex;align-items:center;gap:12px;background:#F8F8F8;border-radius:14px;padding:12px 14px;margin-bottom:8px}
.contact-avatar{width:38px;height:38px;border-radius:50%;background:#E8F5EE;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:13px;font-weight:700;color:#1A1A1A}
.contact-num{font-size:12px;color:#888;margin-top:1px}
.no-contacts{font-size:12px;color:#BBBBBB;text-align:center;padding:12px 0}
.sticky-footer{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:380px;z-index:50}
.btn-emergency{width:100%;padding:17px;background:#FF4444;color:white;border:none;border-radius:50px;font-size:15px;font-weight:800;letter-spacing:0.5px;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:0 8px 24px rgba(255,68,68,0.35);transition:all 0.2s}
.btn-emergency:active{opacity:0.85}
.btn-emergency:disabled{background:#CCCCCC;box-shadow:none;cursor:not-allowed}
.btn-voice{width:100%;padding:14px;background:#4CAF50;color:white;border:none;border-radius:50px;font-size:13px;font-weight:700;letter-spacing:0.5px;font-family:'Inter',sans-serif;cursor:pointer;margin-top:10px;transition:opacity 0.15s}
.btn-voice:active{opacity:0.85}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:white;display:flex;justify-content:space-around;padding:10px 0 18px;border-top:1px solid #EEEEEE;z-index:100}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:#CCCCCC;font-size:10px;font-weight:600}
.bottom-nav a.active{color:#1B5E3B}
.bottom-nav .ni{font-size:22px}
#toast{position:fixed;bottom:150px;left:50%;transform:translateX(-50%) translateY(16px);background:#1A1A1A;color:white;padding:12px 24px;border-radius:50px;font-size:13px;opacity:0;transition:all 0.3s;z-index:999;pointer-events:none;white-space:nowrap;font-family:'Inter',sans-serif}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <h1>Saved Destinations</h1>
    <p>Add emergency contacts to get started</p>
  </div>

  <div class="section-label">EMERGENCY CONTACTS</div>
  <div class="emergency-card">
    <h3>🚨 Emergency Contacts</h3>
    <p class="sub">Add trusted contacts who will be notified when you trigger an emergency alert.</p>
    <div id="contactList"></div>
    <div class="field-group">
      <input class="inp" type="text" id="cName" placeholder="Contact name (e.g. Mum)" autocomplete="off"/>
      <input class="inp" type="tel" id="cNum" placeholder="+234 800 000 0000" autocomplete="tel"/>
    </div>
    <button class="btn-green" onclick="addContact()">+ ADD CONTACT</button>
  </div>
</div>

<div class="sticky-footer">
  <button class="btn-emergency" id="emergencyBtn" onclick="triggerEmergency()">🚨 EMERGENCY ALERT</button>
  <button class="btn-voice" onclick="window.location='/voice-trigger'">🎤 Voice Trigger</button>
</div>

<nav class="bottom-nav">
  <a href="/dashboard" class="active"><span class="ni">📍</span>Saved</a>
  <a href="/alert-history"><span class="ni">📋</span>History</a>
  <a href="/privacy"><span class="ni">🔐</span>Privacy</a>
  <a href="/logout"><span class="ni">🚪</span>Logout</a>
</nav>
<div id="toast"></div>

<script>
let contacts=[];

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function renderContacts(){
  const list=document.getElementById('contactList');
  if(contacts.length===0){
    list.innerHTML='<p class="no-contacts">No contacts added yet</p>';
    return;
  }
  list.innerHTML=contacts.map((c,i)=>`
    <div class="contact-item">
      <div class="contact-avatar">👤</div>
      <div class="contact-info">
        <div class="contact-name">${c.contact_name}</div>
        <div class="contact-num">${c.phone_number}</div>
      </div>
      <button onclick="removeContact(${c.id})" style="background:none;border:none;font-size:20px;cursor:pointer;color:#DDD;padding:4px">🗑️</button>
    </div>
  `).join('');
}

async function addContact(){
  const name=document.getElementById('cName').value.trim();
  const number=document.getElementById('cNum').value.trim();
  if(!name) return toast('Enter contact name');
  if(!number) return toast('Enter phone number');
  
  try{
    const res=await fetch('/add-contact',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:name, phone:number, email:'', relationship:''})
    });
    const data=await res.json();
    if(data.success){
      document.getElementById('cName').value='';
      document.getElementById('cNum').value='';
      loadContacts();
      toast(name+' added ✅');
    } else {
      toast(data.message||'Failed to add contact');
    }
  }catch(e){
    toast('Error: '+e.message);
  }
}

async function removeContact(id){
  toast('Contact removed');
}

async function triggerEmergency(){
  if(contacts.length===0) return toast('Add emergency contacts first');
  
  const btn=document.getElementById('emergencyBtn');
  btn.disabled=true;
  btn.textContent='⏳ Sending...';
  
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(async (pos)=>{
      try{
        const res=await fetch('/emergency',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude,
            trigger_type: 'manual'
          })
        });
        const data=await res.json();
        if(data.success){
          toast('🚨 Alert sent to '+data.contacts_notified+' contacts!');
        } else {
          toast(data.message||'Failed to send alert');
        }
        btn.textContent='🚨 EMERGENCY ALERT';
        btn.disabled=false;
      }catch(e){
        toast('Error: '+e.message);
        btn.textContent='🚨 EMERGENCY ALERT';
        btn.disabled=false;
      }
    }, (err)=>{
      toast('Enable location access');
      btn.textContent='🚨 EMERGENCY ALERT';
      btn.disabled=false;
    });
  }else{
    toast('Location not available');
    btn.textContent='🚨 EMERGENCY ALERT';
    btn.disabled=false;
  }
}

async function loadContacts(){
  try{
    const res=await fetch('/dashboard');
    window.location.reload();
  }catch(e){}
}

loadContacts();
</script>
</body>
</html>
