<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reminders – SafeRoute</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #F8F8F8;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.page {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  background: #F8F8F8;
  padding-bottom: 90px;
}

/* HEADER */
.rem-header { padding: 36px 24px 20px; }
.rem-header h1 { font-size: 22px; font-weight: 800; color: #1A1A1A; margin-bottom: 4px; }
.rem-header p { font-size: 13px; color: #888; line-height: 1.5; }

/* TIME SCROLL CARD */
.time-card {
  margin: 0 20px;
  background: white;
  border-radius: 24px;
  padding: 24px 20px 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.07);
}

.time-scroll-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

/* Each scroll column */
.scroll-col {
  position: relative;
  width: 76px;
  height: 150px;
  overflow: hidden;
}

.scroll-list {
  height: 150px;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding: 53px 0;
}
.scroll-list::-webkit-scrollbar { display: none; }

.scroll-item {
  scroll-snap-align: center;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 500;
  color: #CCCCCC;
  transition: color 0.15s, font-size 0.15s, font-weight 0.15s;
  cursor: pointer;
  user-select: none;
}

.scroll-item.center {
  font-size: 26px;
  font-weight: 800;
  color: #1A1A1A;
}

/* fades */
.fade-top, .fade-bottom {
  position: absolute;
  left: 0; right: 0;
  height: 53px;
  pointer-events: none;
  z-index: 2;
}
.fade-top { top: 0; background: linear-gradient(to bottom, white 40%, transparent); }
.fade-bottom { bottom: 0; background: linear-gradient(to top, white 40%, transparent); }

/* selection line */
.center-line {
  position: absolute;
  top: 50%;
  left: 6px; right: 6px;
  height: 44px;
  transform: translateY(-50%);
  border-top: 1.5px solid #E8E4DC;
  border-bottom: 1.5px solid #E8E4DC;
  border-radius: 8px;
  pointer-events: none;
  z-index: 1;
}

.time-colon {
  font-size: 28px;
  font-weight: 800;
  color: #1A1A1A;
  padding-bottom: 4px;
  flex-shrink: 0;
}

/* AM / PM */
.period-col {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-left: 8px;
}
.period-btn {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  background: #F8F8F8;
  color: #AAAAAA;
}
.period-btn.active {
  background: #1A1A1A;
  color: white;
}

/* SECTION */
.section { padding: 20px 24px 0; }
.section label {
  font-size: 15px;
  font-weight: 700;
  color: #1A1A1A;
  display: block;
  margin-bottom: 4px;
}
.section .hint {
  font-size: 12px;
  color: #999;
  margin-bottom: 14px;
  line-height: 1.5;
}

/* INPUT */
.input-wrap { position: relative; }
.input-wrap input {
  width: 100%;
  padding: 14px 44px 14px 16px;
  border: 1.5px solid #E8E4DC;
  border-radius: 14px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  background: white;
  color: #1A1A1A;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.input-wrap input::placeholder { color: #BBBBBB; }
.input-wrap input:focus { border-color: #1B5E3B; }
.input-wrap input.valid { border-color: #2E7D52; }
.check-icon {
  position: absolute;
  right: 16px; top: 50%;
  transform: translateY(-50%);
  color: #2E7D52;
  font-size: 16px;
  font-weight: 700;
  display: none;
}
.input-wrap input.valid ~ .check-icon { display: block; }

/* DAYS */
.days-row {
  display: flex;
  gap: 6px;
}
.day-btn {
  flex: 1;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #F8F8F8;
  color: #AAAAAA;
  font-size: 11px;
  font-weight: 700;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.day-btn.selected {
  background: #1A1A1A;
  color: white;
}

/* BUTTONS */
.save-section { padding: 24px 24px 8px; }
.btn-primary {
  width: 100%;
  padding: 16px;
  background: #1B5E3B;
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.8px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-primary:active { opacity: 0.85; }

.no-thanks {
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: #AAAAAA;
  margin-top: 16px;
  cursor: pointer;
  letter-spacing: 0.3px;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 12px 0 20px;
  border-top: 1px solid #EEEBE4;
  z-index: 100;
}
.bottom-nav a {
  display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  text-decoration: none;
  color: #CCCCCC;
  font-size: 10px; font-weight: 600;
}
.bottom-nav a.active { color: #1B5E3B; }
.bottom-nav .ni { font-size: 22px; }

/* TOAST */
#toast {
  position: fixed;
  bottom: 100px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: #1A1A1A; color: white;
  padding: 12px 24px; border-radius: 50px;
  font-size: 13px; opacity: 0;
  transition: all 0.3s; z-index: 999;
  pointer-events: none; white-space: nowrap;
  font-family: 'Inter', sans-serif;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="page">

  <div class="rem-header">
    <h1>What time would you like to go out?</h1>
    <p>Any time you can choose but we recommend first thing in the morning.</p>
  </div>

  <!-- TIME PICKER CARD -->
  <div class="time-card">
    <div class="time-scroll-row">

      <!-- HOUR 1–12 -->
      <div class="scroll-col">
        <div class="fade-top"></div>
        <div class="center-line"></div>
        <div class="scroll-list" id="hourScroll">
          <div class="scroll-item">01</div>
          <div class="scroll-item">02</div>
          <div class="scroll-item">03</div>
          <div class="scroll-item">04</div>
          <div class="scroll-item">05</div>
          <div class="scroll-item">06</div>
          <div class="scroll-item">07</div>
          <div class="scroll-item">08</div>
          <div class="scroll-item">09</div>
          <div class="scroll-item">10</div>
          <div class="scroll-item">11</div>
          <div class="scroll-item">12</div>
        </div>
        <div class="fade-bottom"></div>
      </div>

      <div class="time-colon">:</div>

      <!-- MINUTE 10, 20, 30, 40, 50 -->
      <div class="scroll-col">
        <div class="fade-top"></div>
        <div class="center-line"></div>
        <div class="scroll-list" id="minuteScroll">
          <div class="scroll-item">10</div>
          <div class="scroll-item">20</div>
          <div class="scroll-item">30</div>
          <div class="scroll-item">40</div>
          <div class="scroll-item">50</div>
        </div>
        <div class="fade-bottom"></div>
      </div>

      <!-- AM / PM -->
      <div class="period-col">
        <button class="period-btn active" id="amBtn" onclick="setPeriod('AM')">AM</button>
        <button class="period-btn" id="pmBtn" onclick="setPeriod('PM')">PM</button>
      </div>

    </div>
  </div>

  <!-- DESTINATION -->
  <div class="section" style="margin-top:4px">
    <label>Where are you going?</label>
    <div class="input-wrap">
      <input type="text" id="destination" placeholder="Enter destination" oninput="validate(this)" autocomplete="off"/>
      <span class="check-icon">✓</span>
    </div>
  </div>

  <!-- DAYS -->
  <div class="section">
    <label>Which day would you like to go out?</label>
    <p class="hint">Everyday is best, but we recommend picking at least five.</p>
    <div class="days-row">
      <button class="day-btn" onclick="toggleDay(this,'SU')">SU</button>
      <button class="day-btn" onclick="toggleDay(this,'M')">M</button>
      <button class="day-btn" onclick="toggleDay(this,'T')">T</button>
      <button class="day-btn" onclick="toggleDay(this,'W')">W</button>
      <button class="day-btn" onclick="toggleDay(this,'TH')">TH</button>
      <button class="day-btn" onclick="toggleDay(this,'F')">F</button>
      <button class="day-btn selected" onclick="toggleDay(this,'S')">S</button>
    </div>
  </div>

  <!-- SAVE -->
  <div class="save-section">
    <button class="btn-primary" onclick="saveReminder()">SAVE</button>
    <p class="no-thanks" onclick="window.location='/saved.html'">NO THANKS</p>
  </div>

  <nav class="bottom-nav">
    <a href="/reminders" class="active"><span class="ni">🔔</span>Remind</a>
    <a href="/saved"><span class="ni">📍</span>Saved</a>
    <a href="/journey"><span class="ni">🛡️</span>Journey</a>
    <a href="/history"><span class="ni">📋</span>History</a>
  </nav>
</div>
<div id="toast"></div>

<script>
const ITEM_H = 44;
let selectedPeriod = 'AM';
let selectedDays = ['S'];

// ── highlight active item on scroll ──
function bindHighlight(id) {
  const el = document.getElementById(id);
  function update() {
    const center = el.scrollTop + 53 + 22; // padding-top + half item
    el.querySelectorAll('.scroll-item').forEach(item => {
      const mid = item.offsetTop + 22;
      const dist = Math.abs(mid - center);
      if (dist < 22) {
        item.classList.add('center');
      } else {
        item.classList.remove('center');
      }
    });
  }
  el.addEventListener('scroll', update, { passive: true });
  // run once after paint
  requestAnimationFrame(update);
}

window.addEventListener('load', () => {
  // Default: hour=11 (index 10), minute=30 (index 2 → "30")
  const hs = document.getElementById('hourScroll');
  const ms = document.getElementById('minuteScroll');
  hs.scrollTop = 10 * ITEM_H;  // 11
  ms.scrollTop = 2 * ITEM_H;   // 30

  bindHighlight('hourScroll');
  bindHighlight('minuteScroll');
});

function getSelected(id) {
  const el = document.getElementById(id);
  const centerScroll = el.scrollTop + 53 + 22;
  let closest = null, closestDist = Infinity;
  el.querySelectorAll('.scroll-item').forEach(item => {
    const dist = Math.abs(item.offsetTop + 22 - centerScroll);
    if (dist < closestDist) { closestDist = dist; closest = item; }
  });
  return closest ? closest.textContent.trim() : '00';
}

function setPeriod(p) {
  selectedPeriod = p;
  document.getElementById('amBtn').classList.toggle('active', p === 'AM');
  document.getElementById('pmBtn').classList.toggle('active', p === 'PM');
}

function toggleDay(btn, day) {
  btn.classList.toggle('selected');
  selectedDays = selectedDays.includes(day)
    ? selectedDays.filter(d => d !== day)
    : [...selectedDays, day];
}

function validate(input) {
  input.classList.toggle('valid', input.value.trim().length > 0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function saveReminder() {
  const destination = document.getElementById('destination').value.trim();
  if (!destination) return showToast('Please enter a destination');
  if (selectedDays.length === 0) return showToast('Please select at least one day');

  const hour = parseInt(getSelected('hourScroll'));
  const minute = parseInt(getSelected('minuteScroll'));

  try {
    const res = await fetch('/api/reminders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ destination, hour, minute, period: selectedPeriod, days: selectedDays })
    });
    const data = await res.json();
    if (data.success) {
      showToast('Reminder saved! ✅');
      setTimeout(() => window.location = '/saved', 1200);
    } else {
      showToast(data.error || 'Failed to save');
    }
  } catch(e) {
    showToast('Could not connect to server');
  }
}
</script>
</body>
</html>
