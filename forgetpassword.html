<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password – SafeRoute</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F8F8F8;min-height:100vh;display:flex;justify-content:center}
.page{width:100%;max-width:420px;min-height:100vh;background:white}
.page-header{padding:20px 20px 0}
.back-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid #E0DAD0;background:white;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;color:#1A1A1A;font-size:18px}
.content{padding:32px 24px 48px}
.icon{font-size:56px;text-align:center;margin-bottom:20px}
h2{font-size:24px;font-weight:800;color:#1A1A1A;text-align:center;margin-bottom:8px}
.sub{font-size:13px;color:#999;text-align:center;margin-bottom:32px;line-height:1.6}
.inp{width:100%;padding:15px 16px;border:1.5px solid #E8E4DC;border-radius:14px;font-size:14px;font-family:'Inter',sans-serif;background:#F8F8F8;color:#1A1A1A;outline:none;transition:border-color 0.2s;margin-bottom:12px;-webkit-appearance:none}
.inp:focus{border-color:#1B5E3B}
.btn{width:100%;padding:16px;background:#1B5E3B;color:white;border:none;border-radius:50px;font-size:15px;font-weight:800;font-family:'Inter',sans-serif;cursor:pointer;margin-top:8px}
.back-link{text-align:center;margin-top:20px;font-size:13px;color:#999}
.back-link a{color:#1B5E3B;font-weight:700;text-decoration:none}
.msg{padding:14px;border-radius:14px;font-size:13px;font-weight:600;text-align:center;margin-bottom:16px;display:none}
.msg.success{background:#E8F5EE;color:#1B5E3B}
.msg.error{background:#FFEBEE;color:#D32F2F}

/* New password section */
#newPwSection{display:none}
.inp-wrap{position:relative;margin-bottom:12px}
.inp-wrap input{width:100%;padding:15px 44px 15px 16px;border:1.5px solid #E8E4DC;border-radius:14px;font-size:14px;font-family:'Inter',sans-serif;background:#F8F8F8;color:#1A1A1A;outline:none;-webkit-appearance:none}
.inp-wrap input:focus{border-color:#1B5E3B}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px;user-select:none}
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <a href="/signin" class="back-btn">←</a>
  </div>
  <div class="content">
    <div class="icon">🔐</div>
    <h2>Forgot Password?</h2>
    <p class="sub">Enter your email address and we'll send you a reset code.</p>

    <div class="msg" id="msg"></div>

    <!-- Step 1: Enter email -->
    <div id="emailSection">
      <input class="inp" type="email" id="emailInp" placeholder="Your email address" autocomplete="email"/>
      <button class="btn" onclick="sendCode()">SEND RESET CODE</button>
    </div>

    <!-- Step 2: Enter code + new password -->
    <div id="newPwSection">
      <input class="inp" type="text" id="codeInp" placeholder="Enter 6-digit code from email" maxlength="6"/>
      <div class="inp-wrap">
        <input type="password" id="newPw" placeholder="New password"/>
        <span class="eye" onclick="togglePw()">🙈</span>
      </div>
      <div class="inp-wrap">
        <input type="password" id="confirmPw" placeholder="Confirm new password"/>
      </div>
      <button class="btn" onclick="resetPassword()">SET NEW PASSWORD</button>
    </div>

    <p class="back-link"><a href="/signin">← Back to Sign In</a></p>
  </div>
</div>

<script>
function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
  m.style.display = 'block';
}

async function sendCode() {
  const email = document.getElementById('emailInp').value.trim();
  if (!email) return showMsg('Please enter your email', 'error');
  try {
    const r = await fetch('/api/forgot-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email })
    });
    const d = await r.json();
    if (d.success) {
      showMsg('Reset code sent to your email ✅', 'success');
      document.getElementById('emailSection').style.display = 'none';
      document.getElementById('newPwSection').style.display = 'block';
    } else {
      showMsg(d.error || 'Email not found', 'error');
    }
  } catch(e) { showMsg('Connection error', 'error'); }
}

async function resetPassword() {
  const code = document.getElementById('codeInp').value.trim();
  const newPw = document.getElementById('newPw').value;
  const confirmPw = document.getElementById('confirmPw').value;
  const email = document.getElementById('emailInp').value.trim();
  if (!code) return showMsg('Enter the reset code', 'error');
  if (!newPw || newPw.length < 6) return showMsg('Password must be at least 6 characters', 'error');
  if (newPw !== confirmPw) return showMsg('Passwords do not match', 'error');
  try {
    const r = await fetch('/api/reset-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, code, new_password: newPw })
    });
    const d = await r.json();
    if (d.success) {
      showMsg('Password reset! Redirecting...', 'success');
      setTimeout(() => window.location = '/signin', 2000);
    } else {
      showMsg(d.error || 'Invalid code', 'error');
    }
  } catch(e) { showMsg('Connection error', 'error'); }
}

let pwVisible = false;
function togglePw() {
  pwVisible = !pwVisible;
  document.getElementById('newPw').type = pwVisible ? 'text' : 'password';
  document.querySelector('.eye').textContent = pwVisible ? '👁️' : '🙈';
}
</script>
</body>
</html>
